# =============================================================================
# PolyBot CI/CD Pipeline
# =============================================================================
# Runs on every push and pull request to main/develop branches
# - Tests with pytest
# - Lints with ruff
# - Builds Docker image (no push)
# - Validates backtester functionality
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop, copilot/*]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Limit permissions for security
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Lint Job - Fast feedback on code style
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  # ---------------------------------------------------------------------------
  # Test Job - Run pytest with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Backtest Job - Validate backtester module
  # ---------------------------------------------------------------------------
  backtest:
    name: Backtest Validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate backtester imports
        run: |
          python -c "from polybot.backtester import Backtester, BacktestResult; print('✓ Backtester imports OK')"
          python -c "from polybot.portfolio_manager import PortfolioManager; print('✓ PortfolioManager imports OK')"
          python -c "from polybot.volatility_regime import VolatilityRegimeDetector; print('✓ VolatilityRegimeDetector imports OK')"
          python -c "from polybot.execution_logger import ExecutionLogger; print('✓ ExecutionLogger imports OK')"

      - name: Run backtester tests
        run: pytest tests/test_backtester.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker Build Job - Verify Dockerfile builds correctly
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]  # Only build if lint and test pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: polybot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm polybot:${{ github.sha }} python -c "from polybot.main_fastapi import app; print('OK')"
